name: Compose CI

on:
  push:
    branches: ["main"]

permissions:
  contents: write


env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  compose:
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout with write permission
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2️ Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️ Measure Build Time
      - name: Build Docker Compose
        run: |
          START_TIME=$(date +%s)
          docker compose build
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))

          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "Build Time: $BUILD_TIME"

      # 4️ Run Decision Engine
      - name: Run Decision Engine
        run: |
          DEPLOY=$(python decision_engine.py)
          echo "DEPLOY=$DEPLOY" >> $GITHUB_ENV
          echo "Decision: $DEPLOY"


      # AWS login
      - name: Configure AWS Credentials
        if: env.DEPLOY == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: env.DEPLOY == 'true'
        uses: aws-actions/amazon-ecr-login@v2


        # Tag + Push ALL services
      - name: Tag and Push Images
        if: env.DEPLOY == 'true'
        run: |
          ECR=${{ secrets.ECR_URI }}

          ECR=${{ secrets.ECR_URI }}

          docker tag frontend_app:latest $ECR:frontend_app
          docker tag backend_app:latest $ECR:backend_app
          docker tag backend_database:latest $ECR:database

          docker push $ECR:frontend_app
          docker push $ECR:backend_app
          docker push $ECR:database

      # 5️ Conditional Deployment
      - name: Run Docker Compose
        if: env.DEPLOY == 'true'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: docker compose up -d

      # 6️ Stop Containers
      - name: Stop Docker Compose
        if: always()
        run: docker compose down


      # Deploy on EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            AWS_REGION=${{ secrets.AWS_REGION }}
            ECR=${{ secrets.ECR_URI }}

            echo "Logging into ECR..."
            aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR
            
            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Stopping old containers..."
            docker compose -f docker-compose.prod.yml down

            echo "Starting new containers..."
            docker compose -f docker-compose.prod.yml up -d
      # 7️ Commit Updated History Back to Repo
      - name: Commit Updated Metrics
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add metrics/history.json
          git commit -m "Update metrics history [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
